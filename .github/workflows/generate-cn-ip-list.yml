name: Generate CN IP List

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "build_ip_address/**"
      - ".github/workflows/generate-cn-ip-list.yml"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate MikroTik script
        run: python build_ip_address/main.py

      - name: Delete previous release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CN IPv4 Script
          body: |
            Auto-generated MikroTik CN IPv4 address list.

            Source workflow: `${{ github.workflow }}`
            Commit: `${{ github.sha }}`
          files: cn_ipv4_script.rsc
